<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Scientific Calculator</title>
    <meta name="description" content="A beautiful and functional premium scientific calculator designed with sleek aesthetics.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator-container">
        <div class="calculator-glass">
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="keypad">
                <!-- Row 1 -->
                <button class="btn btn-scientific" data-unary="sin">sin</button>
                <button class="btn btn-scientific" data-unary="cos">cos</button>
                <button class="btn btn-scientific" data-unary="tan">tan</button>
                <button class="btn btn-action" data-action="clear">AC</button>
                <button class="btn btn-action" data-action="delete">DEL</button>
                
                <!-- Row 2 -->
                <button class="btn btn-scientific" data-unary="log">log</button>
                <button class="btn btn-scientific" data-unary="ln">ln</button>
                <button class="btn btn-scientific" data-unary="!">n!</button>
                <button class="btn btn-scientific" data-unary="%">%</button>
                <button class="btn btn-operator" data-operator="÷">÷</button>
                
                <!-- Row 3 -->
                <button class="btn btn-scientific" data-unary="√">√</button>
                <button class="btn btn-number" data-number="7">7</button>
                <button class="btn btn-number" data-number="8">8</button>
                <button class="btn btn-number" data-number="9">9</button>
                <button class="btn btn-operator" data-operator="×">×</button>
                
                <!-- Row 4 -->
                <button class="btn btn-scientific" data-unary="x²">x²</button>
                <button class="btn btn-number" data-number="4">4</button>
                <button class="btn btn-number" data-number="5">5</button>
                <button class="btn btn-number" data-number="6">6</button>
                <button class="btn btn-operator" data-operator="−">−</button>
                
                <!-- Row 5 -->
                <button class="btn btn-scientific" data-operator="x^y">xʸ</button>
                <button class="btn btn-number" data-number="1">1</button>
                <button class="btn btn-number" data-number="2">2</button>
                <button class="btn btn-number" data-number="3">3</button>
                <button class="btn btn-operator" data-operator="+">+</button>
                
                <!-- Row 6 -->
                <button class="btn btn-scientific" data-constant="π">π</button>
                <button class="btn btn-scientific" data-constant="e">e</button>
                <button class="btn btn-number" data-number="0">0</button>
                <button class="btn btn-number" data-number=".">.</button>
                <button class="btn btn-equals" data-action="calculate">=</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
